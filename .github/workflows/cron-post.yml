# Post next tweet from the appropriate queue: 10am IST → 10am queue, 6pm IST → 6pm queue.
name: Cron post next tweet

on:
  schedule:
    - cron: '45 3 * * *'   # 03:45 UTC = 09:15 IST — 45 min early for 10am queue (compensates for GitHub Actions delay)
    - cron: '45 11 * * *'  # 11:45 UTC = 17:15 IST — 45 min early for 6pm queue (compensates for GitHub Actions delay)
  workflow_dispatch:
    inputs:
      queue:
        description: 'Queue to run (10am or 6pm); leave empty to auto-detect from current UTC time'
        required: false
        default: ''

env:
  NODE_VERSION: '22'

jobs:
  post-next:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: next_xcom
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: next_xcom/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Post next tweet
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SCHEDULE_QUEUE: ${{ github.event.inputs.queue }}
        run: npm run cron:post
