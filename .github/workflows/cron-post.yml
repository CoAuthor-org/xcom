# Post next tweet from the appropriate queue. Runs at 8am, 12pm, 4pm, 8pm IST.
name: Cron post next tweet

on:
  schedule:
    - cron: '30 2 * * *'   # 02:30 UTC = 8am IST
    - cron: '30 6 * * *'   # 06:30 UTC = 12pm IST
    - cron: '30 10 * * *'  # 10:30 UTC = 4pm IST
    - cron: '30 14 * * *'  # 14:30 UTC = 8pm IST
  workflow_dispatch:
    inputs:
      queue:
        description: 'Queue to run (8am, 12pm, 4pm, 8pm); leave empty to auto-detect from current UTC time'
        required: false
        default: ''

env:
  NODE_VERSION: '22'

jobs:
  post-next:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: next_xcom
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: next_xcom/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Post next tweet
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SCHEDULE_QUEUE: ${{ github.event.inputs.queue }}
        run: npm run cron:post
