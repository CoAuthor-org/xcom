# X Engager inbound: poll user @mentions and enqueue Grok drafts (OAuth user context required on the server).
# Vercel Hobby often allows only two crons; this workflow avoids a third Vercel cron slot.
# PAUSED: Project on hold — restore `schedule` + cron lines below when resuming.
name: Poll X mentions (inbound)

on:
  workflow_dispatch:

jobs:
  poll-mentions:
    runs-on: ubuntu-latest
    steps:
      - name: Hit poll-mentions cron route
        env:
          # Production origin only (no path). CRON_SECRET proves the caller is allowed; it does not tell GitHub *where* your app lives.
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RAW="${APP_BASE_URL:-$SITE_URL}"
          if [ -z "$RAW" ]; then
            echo "Missing deployment URL: add a GitHub Actions secret APP_BASE_URL (or SITE_URL) with your live app origin, e.g. https://your-app.vercel.app — no trailing slash."
            echo "CRON_SECRET is separate: it must match CRON_SECRET on Vercel so the request is authorized."
            exit 1
          fi
          BASE="${RAW%/}"
          AUTH_HEADER=()
          if [ -n "$CRON_SECRET" ]; then
            AUTH_HEADER=(-H "Authorization: Bearer $CRON_SECRET")
          else
            echo "::warning::CRON_SECRET is empty in GitHub secrets. Add it (same value as Vercel) so only authorized callers can hit the cron route."
          fi
          HTTP=$(curl -sS -o /tmp/poll_mentions_body -w "%{http_code}" -X POST "$BASE/api/cron/poll-mentions" \
            "${AUTH_HEADER[@]}" \
            -H "Accept: application/json")
          echo "HTTP $HTTP"
          cat /tmp/poll_mentions_body
          echo ""
          if [ "$HTTP" != "200" ]; then
            echo "::error::poll-mentions failed. A 503 JSON body usually means Vercel is missing env: SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY, or XAI_API_KEY/GROK_API_KEY, or X OAuth (X_API_KEY, X_API_SECRET, X_ACCESS_TOKEN, X_ACCESS_TOKEN_SECRET) for mentions."
            exit 1
          fi
