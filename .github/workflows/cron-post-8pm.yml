# Post next tweet from 8pm queue. Scheduled 1h early (7pm IST) to absorb GitHub Actions delay.
# PAUSED: Project on hold — restore `schedule` + cron line below when resuming.
name: Cron post 8pm

on:
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  post-next:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: next_xcom
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: next_xcom/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Post next tweet (8pm queue)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SCHEDULE_QUEUE: '8pm'
        run: npm run cron:post
