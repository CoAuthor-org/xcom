# Calls the deployed newsletters retention endpoint (weekly).
# Set repository secrets: DEPLOYMENT_BASE_URL (no trailing slash), CRON_SECRET (same as app CRON_SECRET).
name: Newsletters cleanup cron

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * 0"

jobs:
  purge-old-newsletters:
    runs-on: ubuntu-latest
    steps:
      - name: Purge unstarred newsletters older than 7 days
        env:
          BASE: ${{ secrets.DEPLOYMENT_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$BASE" ] || [ -z "$CRON_SECRET" ]; then
            echo "Skip: set DEPLOYMENT_BASE_URL and CRON_SECRET repository secrets to enable this job."
            exit 0
          fi
          curl -fsS -X POST "${BASE}/api/cron/newsletters-cleanup" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Accept: application/json"
